<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VOID TUNER • REAL v2.1</title>
  <style>
    body { background:#0a0a0a; color:#00ff9d; font-family: -apple-system, sans-serif; padding:15px; margin:0; }
    .container { max-width:540px; margin:auto; }
    h1 { text-align:center; margin:30px 0; }
    .status { padding:20px; background:rgba(0,255,157,0.1); border:1px solid #00ff9d; border-radius:20px; text-align:center; margin:15px 0; }
    button { width:100%; padding:18px; margin:10px 0; background:transparent; border:2px solid #00ff9d; color:#00ff9d; font-size:1.1rem; border-radius:18px; }
    button:hover { background:#00ff9d; color:black; }
    .danger { border-color:#ff2d55; color:#ff2d55; }
    .log { background:#111; padding:15px; border-radius:16px; font-family:monospace; height:280px; overflow-y:auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VOID TUNER • REAL</h1>
    <div class="status" id="status">Select model and connect</div>

    <select id="model" style="width:100%; padding:15px; background:#111; color:#00ff9d; border:1px solid #333; border-radius:12px; margin:10px 0;">
      <option value="downgraded">Downgraded Xiaomi / Ninebot (Best Chance)</option>
      <option value="niu">NIU KQi / NQi</option>
    </select>

    <button onclick="connectScooter()">CONNECT TO SCOOTER (BLE)</button>

    <div id="panel" style="display:none;">
      <button onclick="sendCommand([0xAA, 0x01, 0x00, 0x00])">Request Status</button>
      <button onclick="setSpeed(35)">Set 35 km/h Limit</button>
      <button onclick="setSpeed(50)">Set 50 km/h Limit</button>
      <button onclick="setSpeed(65)">Set 65 km/h Limit</button>
      <button class="danger" onclick="removeLimits()">REMOVE ALL LIMITS (DANGER)</button>
      <button onclick="disconnect()">DISCONNECT</button>
    </div>

    <div class="log" id="log">Log initialized...</div>
  </div>

  <script>
    let device = null;
    let server = null;

    function addLog(msg) {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      log.innerHTML += `[${time}] ${msg}<br>`;
      log.scrollTop = log.scrollHeight;
    }

    async function connectScooter() {
      const model = document.getElementById('model').value;
      addLog(`Attempting connection to ${model}...`);

      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [
            {namePrefix: "Ninebot"}, {namePrefix: "Xiaomi"}, {namePrefix: "Segway"},
            {namePrefix: "NIU"}, {namePrefix: "KQi"}, {namePrefix: "ES"}, {namePrefix: "Max"}
          ],
          optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
        });

        server = await device.gatt.connect();
        addLog(`✅ Connected to ${device.name}`);
        document.getElementById('status').textContent = `Connected: ${device.name}`;
        document.getElementById('panel').style.display = 'block';

      } catch (err) {
        addLog(`❌ Failed: ${err.message}`);
      }
    }

    async function sendCommand(bytes) {
      if (!server) return addLog("Not connected");
      try {
        const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
        const char = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");
        await char.writeValue(new Uint8Array(bytes));
        addLog(`Command sent: ${bytes.map(b => b.toString(16).padStart(2,'0')).join(' ')}`);
      } catch (e) {
        addLog("Write failed - Protocol may be encrypted or wrong characteristic");
      }
    }

    function setSpeed(kmh) {
      addLog(`Setting speed limit to ${kmh} km/h...`);
      // Common pattern for older downgraded scooters
      sendCommand([0xAA, 0x01, kmh, 0x00, 0x00, 0x00]);
    }

    function removeLimits() {
      if (!confirm("DANGER: Remove all limits on downgraded scooter?")) return;
      addLog("Sending REMOVE LIMITS command...");
      sendCommand([0xAA, 0xFF, 0x01, 0x00, 0x00, 0x00]);
    }

    function disconnect() {
      if (device) device.gatt.disconnect();
      document.getElementById('panel').style.display = 'none';
      addLog("Disconnected");
    }
  </script>
</body>
</html>
